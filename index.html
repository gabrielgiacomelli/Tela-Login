<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <header>
        <h1>Login</h1><br><br>
    </header>
    <main>
        <form>
            <label for="email">EMAIL:</label>
            <input type="email" id="email" placeholder="Digite o email:" required><br><br>
            
            <label for="senha">SENHA:</label>
            <input type="password" id="senha" placeholder="Digite a senha:" required><br><br>

            <button type="submit">ENTRAR</button>
        </form>
    </main>
    <footer></footer>
</body>
</html>
