<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Importa o Bootstrap (estilos prontos) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<!-- Classes do Bootstrap para centralizar e estilizar -->
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <!-- bg-light = fundo cinza claro -->
     <!-- d-flex = ativa o flexbox -->
      <!-- align-items-center = centraliza verticalmente -->
       <!-- justify-content-center = centraliza horizontalmente -->
        <!-- vh-100 = altura 100% da tela -->
<main class="container">
<!-- container = cria margens laterais e organiza -->
    <!-- Linha do sistema de grid -->
    <div class="row justify-content-center">
        <!-- se adapta ao tamanho da tela -->
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <!-- Card (caixa do formulário) -->
            <div class="card p-4 shadow">
                <h2 class="text-center mb-4">Login</h2>
                <form id="formLogin">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input  type="email" id="email" class="form-control" placeholder="Digite o email" required>
                    </div>

                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input  type="password"  id="senha"   class="form-control"  placeholder="Digite a senha" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100"> Entrar</button>
                </form>
                <div class="text-center mt-3 d-flex">
                    <P>Não tem conta?</P>
                    <a href="#">Criar conta</a>
                </div>

                <!-- Área para mostrar mensagens -->
                <div id="mensagem" class="text-center mt-3"></div>

            </div>
        </div>
    </div>
</main>

<!-- JavaScript -->
<script>
    // Seleciona o formulário
    const form = document.getElementById("formLogin");

    // Seleciona a área de mensagem
    const mensagem = document.getElementById("mensagem");

    // Evento ao enviar o formulário
    form.addEventListener("submit", function(event) {
        // Impede recarregar a página
        event.preventDefault();

        // Pega os valores digitados
        const email = document.getElementById("email").value;
        const senha = document.getElementById("senha").value;

        // Validação simples
        if (email === "" || senha === "") {
            mensagem.style.color = "red";
            mensagem.textContent = "Preencha todos os campos!";
            return;
        }

        // Simulação de login
        if (email === "admin@email.com" && senha === "123456") {
            mensagem.style.color = "green";
            mensagem.textContent = "Login realizado com sucesso!";
        } else {
            mensagem.style.color = "red";
            mensagem.textContent = "E-mail ou senha inválidos!";
        }
    });
</script>

</body>
</html>
