<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<main class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">

            <div class="card p-4 shadow">
                <h2 class="text-center mb-4">Login</h2>

                <form>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" class="form-control">
                    </div>

                    <button class="btn btn-primary w-100">Entrar</button>
                </form>

                <div class="text-center mt-3">
                    <a href="#">Esqueci minha senha</a><br>
                    <a href="#">Criar conta</a>
                </div>

            </div>
        </div>
    </div>
</main>

<!--
bg-light → fundo claro
d-flex → ativa flexbox
align-items-center → centraliza vertical
justify-content-center → centraliza horizontal
vh-100 → altura total da tela
container → estrutura central da página
row → linha do grid
justify-content-center → centraliza colunas
col-12 → 100% no celular
col-sm-8 → 8 colunas em telas pequenas
col-md-6 → metade da tela
col-lg-4 → menor no desktop
card → caixa estilizada
p-4 → espaçamento interno
shadow → sombra
text-center → centraliza texto
mb-4 → margem inferior
mb-3 → espaço entre elementos
form-label → estilo do label
form-control → estilo do input
btn → botão padrão
btn-primary → botão azul
w-100 → largura total
mt-3 → margem superior
 -->
</body>
</html>
